<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helionyx Virtual Office - Production Engine v1.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #nav-ui {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        button {
            background: rgba(255, 140, 0, 0.1);
            border: 1px solid #FF8C00;
            color: #FF8C00;
            padding: 12px 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        button:hover {
            background: #FF8C00;
            color: #000;
            box-shadow: 0 0 20px #FF8C00;
        }
        #status-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 100;
        }
        .room-label {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: 8vw;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="status-display">
        <span style="color: #FF8C00;">●</span> HELIONYX_OS_V1.0 <br>
        LOCATION: <span id="current-room">LOBBY</span>
    </div>

    <div id="nav-ui">
        <button onclick="goToRoom('lobby')" data-testid="nav-lobby">The Lobby</button>
        <button onclick="goToRoom('gallery')" data-testid="nav-gallery">The Gallery</button>
        <button onclick="goToRoom('boardroom')" data-testid="nav-boardroom">The Boardroom</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.04);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // INFINITE GRID FLOOR
        const grid = new THREE.GridHelper(500, 100, 0x333333, 0x111111);
        scene.add(grid);

        // ROOM COORDINATES
        const rooms = {
            lobby: { x: 0, y: 3, z: 12, target: { x: 0, y: 1, z: 0 } },
            gallery: { x: 30, y: 5, z: 5, target: { x: 30, y: 2, z: -10 } },
            boardroom: { x: -30, y: 4, z: -5, target: { x: -30, y: 2, z: -20 } }
        };

        // ASSETS: LOBBY (THE DESK)
        const deskGeo = new THREE.BoxGeometry(8, 0.5, 4);
        const deskMat = new THREE.MeshStandardMaterial({ color: 0xFF8C00, roughness: 0.1 });
        const desk = new THREE.Mesh(deskGeo, deskMat);
        desk.position.set(0, 1, 0);
        scene.add(desk);

        // ASSETS: GALLERY (PHOTO WALLS)
        for(let i=0; i<3; i++) {
            const wallGeo = new THREE.PlaneGeometry(6, 4);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0088FF, side: THREE.DoubleSide });
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(25 + (i*5), 3, -15);
            scene.add(wall);
        }

        // ASSETS: BOARDROOM (THE TABLE)
        const tableGeo = new THREE.CylinderGeometry(4, 4, 0.5, 32);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x8800FF });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.set(-30, 1.5, -20);
        scene.add(table);

        // LIGHTING
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const spot = new THREE.SpotLight(0xffffff, 50);
        spot.position.set(0, 20, 0);
        scene.add(spot);

        // INITIAL CAMERA
        camera.position.set(rooms.lobby.x, rooms.lobby.y, rooms.lobby.z);
        camera.lookAt(rooms.lobby.target.x, rooms.lobby.target.y, rooms.lobby.target.z);

        // NAVIGATION LOGIC
        window.goToRoom = (roomKey) => {
            const room = rooms[roomKey];
            document.getElementById('current-room').innerText = roomKey.toUpperCase();
            
            // GSAP CAMERA FLIGHT
            gsap.to(camera.position, {
                x: room.x, y: room.y, z: room.z,
                duration: 2, ease: "power2.inOut"
            });
            
            // WE NEED TO INTERPOLATE THE 'LOOK AT' POINT AS WELL
            const currentTarget = { x: 0, y: 1, z: 0 }; // Simplified for now
            gsap.to(currentTarget, {
                x: room.target.x, y: room.target.y, z: room.target.z,
                duration: 2,
                onUpdate: () => camera.lookAt(currentTarget.x, currentTarget.y, currentTarget.z)
            });
        };

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
