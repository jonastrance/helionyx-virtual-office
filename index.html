<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helionyx Digital Property - Clean Tech v1.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #f0f4f8; overflow: hidden; font-family: 'Inter', sans-serif; color: #1a1a1a; }
        
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        #nav-header {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 60px;
            box-sizing: border-box;
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 24px;
            color: #FF8C00;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.2);
        }

        #nav-menu {
            display: flex;
            gap: 40px;
            pointer-events: auto;
        }

        .nav-item {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            color: rgba(0, 0, 0, 0.4);
            font-weight: 600;
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: #FF8C00;
        }

        #footer-status {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(0, 0, 0, 0.2);
        }

        #action-button {
            position: absolute;
            bottom: 40px;
            right: 60px;
            padding: 15px 35px;
            background: #FF8C00;
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 10px 20px rgba(255, 140, 0, 0.2);
            transition: all 0.3s;
        }

        #action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.3);
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }

        #progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(0, 0, 0, 0.05);
            margin-top: 20px;
            position: relative;
        }

        #progress-fill {
            position: absolute;
            height: 100%;
            background: #FF8C00;
            width: 0%;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="brand-logo">HELIONYX</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="ui-layer">
        <div id="nav-header">
            <div class="brand-logo">HELIONYX</div>
            <div id="nav-menu">
                <div class="nav-item active" onclick="goToRoom('lobby')" data-testid="nav-lobby">Entrance</div>
                <div class="nav-item" onclick="goToRoom('gallery')" data-testid="nav-gallery">The Gallery</div>
                <div class="nav-item" onclick="goToRoom('boardroom')" data-testid="nav-boardroom">The Boardroom</div>
            </div>
        </div>

        <div id="footer-status">
            SYSTEM_OS_V1.6 // ENVIRONMENT: CLEAN_TECH // LIGHT_MODE_ACTIVE
        </div>

        <button id="action-button">REQUEST ACCESS</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ENGINE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f4f8);
        scene.fog = new THREE.FogExp2(0xf0f4f8, 0.04);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // ROOMS REGISTRY
        const rooms = {
            lobby: { pos: [0, 4, 12], target: [0, 2, 0] },
            gallery: { pos: [40, 6, 8], target: [40, 2, -15] },
            boardroom: { pos: [-40, 5, -5], target: [-40, 2, -25] }
        };

        // --- ASSET CREATION ---

        // GROUND: CLEAN WHITE GLASS
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff, metalness: 0, roughness: 0.05, transmission: 0.5, reflectivity: 1, clearcoat: 1
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // SUBTLE GRID OVERLAY
        const grid = new THREE.GridHelper(500, 100, 0x000000, 0x000000);
        grid.position.y = 0.01;
        grid.material.opacity = 0.03;
        grid.material.transparent = true;
        scene.add(grid);

        // 1. THE LOBBY - CLEAN FROSTED DESK
        const deskGroup = new THREE.Group();
        
        const deskSlabGeo = new THREE.BoxGeometry(10, 0.4, 4);
        const frostedMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff, transmission: 0.9, roughness: 0.15, ior: 1.5, thickness: 2
        });
        const deskSlab = new THREE.Mesh(deskSlabGeo, frostedMat);
        deskSlab.position.y = 1.5;
        deskGroup.add(deskSlab);

        const baseGeo = new THREE.BoxGeometry(6, 1.5, 2);
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
        const deskBase = new THREE.Mesh(baseGeo, whiteMat);
        deskBase.position.y = 0.75;
        deskGroup.add(deskBase);

        // Glowing Core
        const coreGeo = new THREE.IcosahedronGeometry(0.8, 0);
        const coreMat = new THREE.MeshStandardMaterial({ 
            color: 0xFF8C00, emissive: 0xFF8C00, emissiveIntensity: 2 
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        core.position.set(0, 3, -1);
        deskGroup.add(core);

        scene.add(deskGroup);

        // 2. THE GALLERY - MINIMAL FLOATING FRAMES
        const galleryGroup = new THREE.Group();
        galleryGroup.position.x = 40;

        for(let i=0; i<4; i++) {
            const frameGeo = new THREE.BoxGeometry(8, 5, 0.2);
            const frameMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, roughness: 0.05 });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.set((i-1.5)*12, 3, -20);
            galleryGroup.add(frame);
        }
        scene.add(galleryGroup);

        // 3. THE BOARDROOM - MATTE MEETING TABLE
        const boardGroup = new THREE.Group();
        boardGroup.position.set(-40, 0, -25);

        const tableGeo = new THREE.CylinderGeometry(6, 6, 0.4, 64);
        const table = new THREE.Mesh(tableGeo, frostedMat);
        table.position.y = 2;
        boardGroup.add(table);

        const pillarGeo = new THREE.CylinderGeometry(2, 2, 2, 32);
        const pillar = new THREE.Mesh(pillarGeo, whiteMat);
        pillar.position.y = 1;
        boardGroup.add(pillar);

        scene.add(boardGroup);

        // LIGHTING
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);

        const accentLight = new THREE.PointLight(0xFF8C00, 10, 20);
        accentLight.position.set(0, 4, 0);
        scene.add(accentLight);

        // NAVIGATION LOGIC
        window.goToRoom = (roomKey) => {
            const room = rooms[roomKey];
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="goToRoom('${roomKey}')"]`).classList.add('active');

            gsap.to(camera.position, {
                x: room.pos[0], y: room.pos[1], z: room.pos[2],
                duration: 2.5, ease: "power3.inOut"
            });

            const currentTarget = { x: camera.position.x, y: 0, z: 0 };
            gsap.to(currentTarget, {
                x: room.target[0], y: room.target[1], z: room.target[2],
                duration: 2.5,
                ease: "power3.inOut",
                onUpdate: () => camera.lookAt(currentTarget.x, currentTarget.y, currentTarget.z)
            });
        };

        // INITIAL POSITION
        camera.position.set(rooms.lobby.pos[0], rooms.lobby.pos[1], rooms.lobby.pos[2]);
        camera.lookAt(rooms.lobby.target[0], rooms.lobby.target[1], rooms.lobby.target[2]);

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            core.rotation.y += 0.01;
            core.position.y = 3 + Math.sin(Date.now() * 0.002) * 0.1;
            renderer.render(scene, camera);
        }
        animate();

        // LOADING
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            document.getElementById('progress-fill').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(interval);
                gsap.to('#loading-screen', { opacity: 0, duration: 0.5, onComplete: () => {
                    document.getElementById('loading-screen').style.display = 'none';
                }});
            }
        }, 30);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
