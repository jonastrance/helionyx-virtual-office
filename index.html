<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helionyx Digital Property - Production v1.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #000211; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
        
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        #nav-header {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 60px;
            box-sizing: border-box;
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 24px;
            color: #FF8C00;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
        }

        #nav-menu {
            display: flex;
            gap: 40px;
            pointer-events: auto;
        }

        .nav-item {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: #FF8C00;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        #footer-status {
            position: absolute;
            bottom: 40px;
            left: 60px;
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.3);
        }

        #action-button {
            position: absolute;
            bottom: 40px;
            right: 60px;
            padding: 15px 35px;
            background: rgba(255, 140, 0, 0.1);
            border: 1px solid #FF8C00;
            color: #FF8C00;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        #action-button:hover {
            background: #FF8C00;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.4);
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s;
        }

        #progress-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 20px;
            position: relative;
        }

        #progress-fill {
            position: absolute;
            height: 100%;
            background: #FF8C00;
            width: 0%;
            box-shadow: 0 0 10px #FF8C00;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="brand-logo">HELIONYX</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="ui-layer">
        <div id="nav-header">
            <div class="brand-logo">HELIONYX</div>
            <div id="nav-menu">
                <div class="nav-item active" onclick="goToRoom('lobby')" data-testid="nav-lobby">Entrance</div>
                <div class="nav-item" onclick="goToRoom('gallery')" data-testid="nav-gallery">The Gallery</div>
                <div class="nav-item" onclick="goToRoom('boardroom')" data-testid="nav-boardroom">The Boardroom</div>
            </div>
        </div>

        <div id="footer-status">
            SYSTEM_OS_V1.5 // CORE_TEMP: OPTIMAL // STATUS: SECURE_CONNECTION
        </div>

        <button id="action-button">REQUEST ACCESS</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ENGINE SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000211, 0.05);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ROOMS REGISTRY
        const rooms = {
            lobby: { pos: [0, 4, 12], target: [0, 2, 0] },
            gallery: { pos: [40, 6, 8], target: [40, 2, -15] },
            boardroom: { pos: [-40, 5, -5], target: [-40, 2, -25] }
        };

        // --- ASSET CREATION ---

        // GROUND: DEEP GLASS
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x000211, metalness: 0.9, roughness: 0.05, transmission: 0.1, reflectivity: 1 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // GRID OVERLAY
        const grid = new THREE.GridHelper(500, 100, 0xFF8C00, 0x111111);
        grid.position.y = 0.01;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // 1. THE LOBBY - GLASS RECEPTION DESK
        const deskGroup = new THREE.Group();
        
        const deskSlabGeo = new THREE.BoxGeometry(10, 0.4, 4);
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff, transmission: 0.95, roughness: 0.05, ior: 1.5, thickness: 1, specularIntensity: 1
        });
        const deskSlab = new THREE.Mesh(deskSlabGeo, glassMat);
        deskSlab.position.y = 1.5;
        deskGroup.add(deskSlab);

        const baseGeo = new THREE.BoxGeometry(6, 1.5, 2);
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1, roughness: 0.2 });
        const deskBase = new THREE.Mesh(baseGeo, metalMat);
        deskBase.position.y = 0.75;
        deskGroup.add(deskBase);

        // Holographic Logo
        const logoGeo = new THREE.IcosahedronGeometry(1, 0);
        const logoMat = new THREE.MeshBasicMaterial({ color: 0xFF8C00, wireframe: true });
        const logo = new THREE.Mesh(logoGeo, logoMat);
        logo.position.set(0, 3, -1);
        deskGroup.add(logo);

        scene.add(deskGroup);

        // 2. THE GALLERY - FLOATING FRAMES
        const galleryGroup = new THREE.Group();
        galleryGroup.position.x = 40;

        for(let i=0; i<4; i++) {
            const frameGeo = new THREE.BoxGeometry(8, 5, 0.2);
            const frameMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.8, roughness: 0.1 });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.set((i-1.5)*12, 3, -20);
            
            // Glowing border
            const edges = new THREE.EdgesGeometry(frameGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xFF8C00 }));
            frame.add(line);
            
            galleryGroup.add(frame);
        }
        scene.add(galleryGroup);

        // 3. THE BOARDROOM - FLOATING MEETING TABLE
        const boardGroup = new THREE.Group();
        boardGroup.position.set(-40, 0, -25);

        const tableGeo = new THREE.CylinderGeometry(6, 4, 0.5, 64);
        const table = new THREE.Mesh(tableGeo, glassMat);
        table.position.y = 2;
        boardGroup.add(table);

        const pillarGeo = new THREE.CylinderGeometry(2, 2, 2, 32);
        const pillar = new THREE.Mesh(pillarGeo, metalMat);
        pillar.position.y = 1;
        boardGroup.add(pillar);

        scene.add(boardGroup);

        // LIGHTING
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const orangeLight = new THREE.PointLight(0xFF8C00, 200, 100);
        orangeLight.position.set(0, 10, 5);
        scene.add(orangeLight);

        const whiteLight = new THREE.PointLight(0x0088FF, 100, 100);
        whiteLight.position.set(40, 10, -5);
        scene.add(whiteLight);

        // NAVIGATION LOGIC
        window.goToRoom = (roomKey) => {
            const room = rooms[roomKey];
            
            // Update UI
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[onclick="goToRoom('${roomKey}')"]`).classList.add('active');

            // Fly Camera
            gsap.to(camera.position, {
                x: room.pos[0], y: room.pos[1], z: room.pos[2],
                duration: 2.5, ease: "expo.inOut"
            });

            const currentTarget = { x: camera.position.x, y: 0, z: 0 };
            gsap.to(currentTarget, {
                x: room.target[0], y: room.target[1], z: room.target[2],
                duration: 2.5,
                ease: "expo.inOut",
                onUpdate: () => camera.lookAt(currentTarget.x, currentTarget.y, currentTarget.z)
            });
        };

        // INITIAL POSITION
        camera.position.set(rooms.lobby.pos[0], rooms.lobby.pos[1], rooms.lobby.pos[2]);
        camera.lookAt(rooms.lobby.target[0], rooms.lobby.target[1], rooms.lobby.target[2]);

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            logo.rotation.y += 0.01;
            logo.position.y = 3 + Math.sin(Date.now() * 0.002) * 0.2;
            
            renderer.render(scene, camera);
        }
        animate();

        // LOADING SIMULATION
        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('progress-fill').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(interval);
                gsap.to('#loading-screen', { opacity: 0, duration: 1, onComplete: () => {
                    document.getElementById('loading-screen').style.display = 'none';
                }});
            }
        }, 50);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
